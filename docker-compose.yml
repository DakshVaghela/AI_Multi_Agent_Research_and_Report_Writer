services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Ollama stays on the host (not containerized) so it keeps using the
      # Mac's GPU/Metal acceleration. host.docker.internal reaches the
      # host's Ollama server from inside the container.
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      # Connect to the MongoDB container inside the Docker Compose network
      - MONGO_URI=mongodb://mongodb_local:27017
    extra_hosts:
      # host.docker.internal resolves automatically on Docker Desktop
      # (Mac/Windows); this line is what makes it resolve on Linux too.
      - "host.docker.internal:host-gateway"
    volumes:
      - ./outputs:/app/outputs
    depends_on:
      - mongodb

  mongodb:
    image: mongo:latest
    container_name: mongodb_local
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
